<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>旅行記帳分帳</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --card2:#222631; --line:#2c313c;
    --txt:#e8eaed; --muted:#9aa0aa; --accent:#4f8cff; --accent2:#3a6fd8;
    --good:#39c07d; --bad:#ff6b6b; --warn:#ffb648; --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,"Noto Sans TC",system-ui,sans-serif;
    background:var(--bg);color:var(--txt);font-size:16px;line-height:1.5}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 96px}
  h1{font-size:20px;margin:0}
  h2{font-size:16px;margin:18px 0 8px;color:var(--muted);font-weight:600}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .row{display:flex;gap:8px;align-items:center}
  .row.wrap{flex-wrap:wrap}
  .grow{flex:1}
  label{display:block;font-size:13px;color:var(--muted);margin:10px 0 4px}
  input,select,button,textarea{font-size:16px;font-family:inherit}
  input,select,textarea{width:100%;padding:11px 12px;background:var(--card2);
    border:1px solid var(--line);border-radius:10px;color:var(--txt);outline:none}
  input:focus,select:focus{border-color:var(--accent)}
  button{cursor:pointer;border:none;border-radius:10px;padding:12px 14px;
    background:var(--accent);color:#fff;font-weight:600}
  button:active{transform:scale(.98)}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  button.sm{padding:7px 11px;font-size:14px}
  button.danger{background:transparent;border:1px solid var(--bad);color:var(--bad)}
  .muted{color:var(--muted)}
  .center{text-align:center}
  .pill{display:inline-block;background:var(--card2);border:1px solid var(--line);
    border-radius:999px;padding:3px 10px;font-size:13px;margin:3px 4px 0 0}
  .pill.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .code{font-family:ui-monospace,monospace;letter-spacing:2px;font-weight:700;color:var(--accent)}
  .tabs{position:fixed;left:0;right:0;bottom:0;display:flex;background:var(--card);
    border-top:1px solid var(--line);max-width:560px;margin:0 auto}
  .tabs button{flex:1;background:transparent;color:var(--muted);border:none;
    border-radius:0;padding:11px 0 14px;font-size:12px;font-weight:600}
  .tabs button.on{color:var(--accent)}
  .tabs .ic{display:block;font-size:20px;margin-bottom:2px}
  .exp{display:flex;justify-content:space-between;align-items:flex-start;
    padding:11px 0;border-bottom:1px solid var(--line)}
  .exp:last-child{border-bottom:none}
  .exp .desc{font-weight:600}
  .exp .sub{font-size:13px;color:var(--muted);margin-top:2px}
  .amt{font-weight:700;white-space:nowrap;margin-left:10px;text-align:right}
  .amt .o{font-size:12px;color:var(--muted);font-weight:400;display:block}
  .bal{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line)}
  .pos{color:var(--good);font-weight:700}
  .neg{color:var(--bad);font-weight:700}
  .settle{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card2);
    border-radius:10px;margin-bottom:8px}
  .settle .arrow{color:var(--accent);font-weight:700}
  .hide{display:none!important}
  .err{background:#3a1c1c;border:1px solid var(--bad);color:#ffd0d0;padding:10px 12px;
    border-radius:10px;font-size:14px;margin-bottom:10px}
  .splitrow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .splitrow .nm{flex:1}
  .splitrow input{width:110px}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:#000;color:#fff;padding:10px 16px;border-radius:999px;font-size:14px;
    opacity:0;transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:.95}
  .seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{flex:1;background:transparent;color:var(--muted);border-radius:0;padding:9px}
  .seg button.on{background:var(--accent);color:#fff}
  a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== 設定未填提示 ===== -->
  <div id="noconfig" class="card hide">
    <div class="err">尚未設定 Supabase 連線。請打開 <b>index.html</b>，在最上方 <code>CONFIG</code> 區塊填入你的 SUPABASE_URL 與 SUPABASE_ANON_KEY（見「使用說明」）。</div>
  </div>

  <!-- ===== 登陸頁：建立 / 加入 ===== -->
  <div id="setup" class="hide">
    <h1>✈️ 旅行記帳分帳</h1>
    <p class="muted">多人、多幣別。每人在自己手機開同一個帳本即時共記。</p>

    <div class="card">
      <h2 style="margin-top:0">建立新帳本</h2>
      <label>旅程名稱</label>
      <input id="newName" placeholder="例：2026 東京小旅行">
      <label>結算幣別（最後用哪種貨幣算總帳）</label>
      <input id="newBase" value="TWD" maxlength="4" style="text-transform:uppercase">
      <label>你的名字（建立者第一位成員）</label>
      <input id="newMe" placeholder="例：Ivy">
      <button class="grow" style="width:100%;margin-top:14px" onclick="createTrip()">建立帳本</button>
    </div>

    <div class="card">
      <h2 style="margin-top:0">加入已有帳本</h2>
      <label>帳本代碼</label>
      <input id="joinCode" placeholder="6 碼，例：TKO123" style="text-transform:uppercase">
      <button class="ghost" style="width:100%;margin-top:14px" onclick="joinTrip()">加入</button>
    </div>
  </div>

  <!-- ===== App 主畫面 ===== -->
  <div id="app" class="hide">
    <div class="topbar">
      <div>
        <h1 id="tripName">—</h1>
        <div class="muted" style="font-size:13px">代碼 <span class="code" id="tripCode"></span>
          · 結算 <span id="tripBase"></span></div>
      </div>
      <button class="ghost sm" onclick="shareTrip()">分享</button>
    </div>
    <div id="errBox"></div>

    <!-- 支出頁 -->
    <div id="tab-exp">
      <button style="width:100%" onclick="openExpenseForm()">＋ 新增支出</button>
      <h2>支出紀錄</h2>
      <div class="card" id="expList"><div class="muted center">尚無支出</div></div>
    </div>

    <!-- 成員頁 -->
    <div id="tab-mem" class="hide">
      <div class="card">
        <h2 style="margin-top:0">新增成員</h2>
        <div class="row">
          <input id="memName" class="grow" placeholder="名字">
          <button onclick="addMember()">加入</button>
        </div>
      </div>
      <div class="card" id="memList"></div>
    </div>

    <!-- 結算頁 -->
    <div id="tab-set" class="hide">
      <h2>每人淨額</h2>
      <div class="card" id="balList"></div>
      <h2>建議轉帳（最少筆數）</h2>
      <div class="card" id="settleList"></div>
    </div>

    <!-- 設定頁（匯率） -->
    <div id="tab-cfg" class="hide">
      <div class="card">
        <h2 style="margin-top:0">匯率設定</h2>
        <p class="muted" style="font-size:13px">設定「1 單位外幣 = ? <span class="baseSym"></span>」。結算幣別固定為 1。新增支出時會以當下匯率換算並記錄快照。</p>
        <div id="rateList"></div>
        <div class="row" style="margin-top:10px">
          <input id="newCur" class="grow" placeholder="幣別代碼 如 JPY" maxlength="4" style="text-transform:uppercase">
          <button class="ghost" onclick="addCurrency()">新增幣別</button>
        </div>
        <button class="ghost" style="width:100%;margin-top:10px" onclick="fetchLiveRates()">🔄 抓取即時匯率</button>
      </div>
      <div class="card">
        <button class="danger" style="width:100%" onclick="leaveTrip()">離開此帳本（回到首頁）</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== 新增支出 浮層 ===== -->
<div id="expModal" class="hide" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;overflow:auto">
  <div class="wrap">
    <div class="card" style="margin-top:24px">
      <div class="topbar"><h1 style="font-size:18px">新增支出</h1>
        <button class="ghost sm" onclick="closeExpenseForm()">✕</button></div>
      <label>項目說明</label>
      <input id="eDesc" placeholder="例：晚餐、計程車">
      <label>分類</label>
      <select id="eCat">
        <option>餐飲</option><option>交通</option><option>住宿</option>
        <option>購物</option><option>門票娛樂</option><option selected>其他</option>
      </select>
      <div class="row">
        <div class="grow"><label>金額</label><input id="eAmt" type="number" inputmode="decimal" placeholder="0"></div>
        <div style="width:120px"><label>幣別</label><select id="eCur"></select></div>
      </div>
      <label>誰付的</label>
      <select id="ePayer"></select>

      <label>分攤方式</label>
      <div class="seg" id="splitSeg">
        <button class="on" data-t="equal" onclick="setSplitType('equal')">平分</button>
        <button data-t="custom" onclick="setSplitType('custom')">自訂金額</button>
      </div>

      <div id="equalBox">
        <label>由誰平分（點選參與者）</label>
        <div id="eqMembers"></div>
      </div>
      <div id="customBox" class="hide">
        <label>各自金額（原幣別，需加總等於上方金額）</label>
        <div id="cuMembers"></div>
        <div class="muted" id="cuSum" style="font-size:13px"></div>
      </div>

      <button style="width:100%;margin-top:16px" onclick="saveExpense()">儲存</button>
    </div>
  </div>
</div>

<!-- ===== 底部分頁 ===== -->
<div class="tabs" id="tabbar">
  <button class="on" data-tab="exp" onclick="showTab('exp')"><span class="ic">📝</span>支出</button>
  <button data-tab="mem" onclick="showTab('mem')"><span class="ic">👥</span>成員</button>
  <button data-tab="set" onclick="showTab('set')"><span class="ic">🧮</span>結算</button>
  <button data-tab="cfg" onclick="showTab('cfg')"><span class="ic">⚙️</span>匯率</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG —— 填入你的 Supabase 專案資訊（見「使用說明.md」）
   ============================================================ */
const SUPABASE_URL  = "https://jajmxgwqpsaaapmsgyqa.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_fu6mrS95JrXfTm_5MSwc6w_aW4BvFQO";
/* ============================================================ */

let sb = null, trip = null, members = [], expenses = [], me = null;
let splitType = 'equal', eqSelected = new Set(), channel = null;

const $ = id => document.getElementById(id);
const toast = msg => { const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800); };
const showErr = msg => { $('errBox').innerHTML = msg ? `<div class="err">${msg}</div>`:''; };
const fmt = n => (Math.round(n*100)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const randCode = () => { const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s='';
  for(let i=0;i<6;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; };

/* ---------- 啟動 ---------- */
function init(){
  if(SUPABASE_URL.startsWith("YOUR_") || SUPABASE_ANON_KEY.startsWith("YOUR_")){
    $('noconfig').classList.remove('hide'); return;
  }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const saved = localStorage.getItem('trip_code');
  const meName = localStorage.getItem('me_name');
  if(saved){ me = meName; loadTrip(saved); }
  else { $('setup').classList.remove('hide'); }
}

/* ---------- 建立 / 加入 / 載入 ---------- */
async function createTrip(){
  const name=$('newName').value.trim(), base=$('newBase').value.trim().toUpperCase()||'TWD', meN=$('newMe').value.trim();
  if(!name||!meN){ showErr('請填旅程名稱與你的名字'); return; }
  const code=randCode();
  const {data:t,error}=await sb.from('trips').insert({code,name,base_currency:base,rates:{}}).select().single();
  if(error){ showErr('建立失敗：'+error.message); return; }
  await sb.from('members').insert({trip_id:t.id,name:meN});
  localStorage.setItem('me_name',meN); me=meN;
  loadTrip(code);
}
async function joinTrip(){
  const code=$('joinCode').value.trim().toUpperCase();
  if(!code){ showErr('請輸入帳本代碼'); return; }
  const {data:t}=await sb.from('trips').select('id,name').eq('code',code).maybeSingle();
  if(!t){ showErr('找不到此帳本代碼'); return; }
  let nm=localStorage.getItem('me_name');
  if(!nm){ nm=prompt('輸入你在這個帳本的名字：'); if(!nm) return; nm=nm.trim(); }
  // 若成員清單沒有我，加入
  const {data:ms}=await sb.from('members').select('name').eq('trip_id',t.id);
  if(!ms.some(m=>m.name===nm)) await sb.from('members').insert({trip_id:t.id,name:nm});
  localStorage.setItem('me_name',nm); me=nm;
  loadTrip(code);
}
async function loadTrip(code){
  const {data:t,error}=await sb.from('trips').select('*').eq('code',code).maybeSingle();
  if(error||!t){ localStorage.removeItem('trip_code'); $('setup').classList.remove('hide'); return; }
  trip=t; localStorage.setItem('trip_code',code);
  $('setup').classList.add('hide'); $('app').classList.remove('hide');
  $('tripName').textContent=t.name; $('tripCode').textContent=t.code; $('tripBase').textContent=t.base_currency;
  document.querySelectorAll('.baseSym').forEach(e=>e.textContent=t.base_currency);
  await refresh();
  subscribe();
}
async function refresh(){
  const [{data:ms},{data:ex}]=await Promise.all([
    sb.from('members').select('*').eq('trip_id',trip.id).order('created_at'),
    sb.from('expenses').select('*').eq('trip_id',trip.id).order('created_at',{ascending:false})
  ]);
  members=ms||[]; expenses=ex||[];
  renderAll();
}
function subscribe(){
  if(channel) sb.removeChannel(channel);
  channel=sb.channel('trip-'+trip.id)
    .on('postgres_changes',{event:'*',schema:'public',table:'members',filter:'trip_id=eq.'+trip.id},refresh)
    .on('postgres_changes',{event:'*',schema:'public',table:'expenses',filter:'trip_id=eq.'+trip.id},refresh)
    .on('postgres_changes',{event:'*',schema:'public',table:'trips',filter:'id=eq.'+trip.id},()=>loadTrip(trip.code))
    .subscribe();
}
function leaveTrip(){ if(!confirm('離開此帳本？資料仍保留在雲端，可用代碼再加入。')) return;
  localStorage.removeItem('trip_code'); location.reload(); }
function shareTrip(){
  const txt=`加入我的旅行帳本「${trip.name}」\n代碼：${trip.code}\n${location.href}`;
  if(navigator.share) navigator.share({title:'旅行記帳分帳',text:txt});
  else { navigator.clipboard.writeText(txt); toast('已複製分享內容'); }
}

/* ---------- 成員 ---------- */
async function addMember(){
  const n=$('memName').value.trim(); if(!n) return;
  if(members.some(m=>m.name===n)){ toast('已有同名成員'); return; }
  $('memName').value='';
  await sb.from('members').insert({trip_id:trip.id,name:n});
}
async function delMember(id){
  if(expenses.some(e=>e.payer_id===id||splitInvolves(e,id))){ toast('此成員已有支出紀錄，無法刪除'); return; }
  if(!confirm('刪除此成員？')) return;
  await sb.from('members').delete().eq('id',id);
}
function splitInvolves(e,id){
  if(e.split_type==='equal') return Array.isArray(e.splits)&&e.splits.includes(id);
  return e.splits && Object.keys(e.splits).includes(id);
}
const memName = id => (members.find(m=>m.id===id)||{}).name||'?';

/* ---------- 匯率 ---------- */
async function saveRates(rates){
  trip.rates=rates;
  await sb.from('trips').update({rates}).eq('id',trip.id);
}
function addCurrency(){
  const c=$('newCur').value.trim().toUpperCase(); if(!c) return;
  if(c===trip.base_currency){ toast('結算幣別不需設定'); return; }
  const r={...trip.rates}; if(!(c in r)) r[c]=1; $('newCur').value='';
  saveRates(r);
}
async function fetchLiveRates(){
  toast('抓取中…');
  try{
    const res=await fetch('https://open.er-api.com/v6/latest/'+trip.base_currency);
    const j=await res.json();
    if(j.result!=='success') throw 0;
    const r={...trip.rates};
    Object.keys(r).forEach(c=>{ if(j.rates[c]) r[c]=Math.round((1/j.rates[c])*10000)/10000; });
    await saveRates(r); toast('匯率已更新');
  }catch(e){ toast('抓取失敗，請手動輸入'); }
}

/* ---------- 支出表單 ---------- */
function openExpenseForm(){
  if(members.length===0){ toast('請先到「成員」頁新增成員'); return; }
  $('eDesc').value=''; $('eAmt').value=''; $('eCat').value='其他';
  // 幣別選單
  const curs=[trip.base_currency,...Object.keys(trip.rates)];
  $('eCur').innerHTML=curs.map(c=>`<option>${c}</option>`).join('');
  $('ePayer').innerHTML=members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  if(me){ const mm=members.find(m=>m.name===me); if(mm) $('ePayer').value=mm.id; }
  eqSelected=new Set(members.map(m=>m.id));
  setSplitType('equal');
  renderSplitMembers();
  $('expModal').classList.remove('hide');
}
function closeExpenseForm(){ $('expModal').classList.add('hide'); }
function setSplitType(t){ splitType=t;
  document.querySelectorAll('#splitSeg button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  $('equalBox').classList.toggle('hide',t!=='equal');
  $('customBox').classList.toggle('hide',t!=='custom');
  if(t==='custom') renderCustomRows();
}
function renderSplitMembers(){
  $('eqMembers').innerHTML=members.map(m=>
    `<span class="pill ${eqSelected.has(m.id)?'on':''}" onclick="toggleEq('${m.id}')">${m.name}</span>`).join('');
}
function toggleEq(id){ eqSelected.has(id)?eqSelected.delete(id):eqSelected.add(id); renderSplitMembers(); }
function renderCustomRows(){
  $('cuMembers').innerHTML=members.map(m=>
    `<div class="splitrow"><span class="nm">${m.name}</span>
      <input type="number" inputmode="decimal" data-mid="${m.id}" placeholder="0" oninput="sumCustom()"></div>`).join('');
  sumCustom();
}
function sumCustom(){
  let s=0; document.querySelectorAll('#cuMembers input').forEach(i=>s+=parseFloat(i.value)||0);
  const amt=parseFloat($('eAmt').value)||0;
  $('cuSum').innerHTML=`已分配 ${fmt(s)} / 總額 ${fmt(amt)} ${$('eCur').value} `+
    (Math.abs(s-amt)<0.005?'<span class="pos">✓</span>':`<span class="neg">差 ${fmt(amt-s)}</span>`);
}
async function saveExpense(){
  const desc=$('eDesc').value.trim()||$('eCat').value;
  const amt=parseFloat($('eAmt').value);
  const cur=$('eCur').value, payer=$('ePayer').value, cat=$('eCat').value;
  if(!amt||amt<=0){ toast('請輸入金額'); return; }
  const rate = cur===trip.base_currency?1:(parseFloat(trip.rates[cur])||0);
  if(!rate){ toast('此幣別尚未設定匯率（到「匯率」頁設定）'); return; }
  let splits;
  if(splitType==='equal'){
    splits=[...eqSelected]; if(splits.length===0){ toast('請選擇參與平分的人'); return; }
  }else{
    splits={}; let s=0;
    document.querySelectorAll('#cuMembers input').forEach(i=>{
      const v=parseFloat(i.value)||0; if(v>0){ splits[i.dataset.mid]=v; s+=v; } });
    if(Object.keys(splits).length===0){ toast('請至少填一人金額'); return; }
    if(Math.abs(s-amt)>0.01){ toast('各自金額加總需等於總額'); return; }
  }
  const {error}=await sb.from('expenses').insert({
    trip_id:trip.id,description:desc,category:cat,payer_id:payer,
    amount:amt,currency:cur,rate_to_base:rate,split_type:splitType,splits});
  if(error){ toast('儲存失敗：'+error.message); return; }
  closeExpenseForm(); toast('已新增');
}
async function delExpense(id){ if(!confirm('刪除這筆支出？')) return; await sb.from('expenses').delete().eq('id',id); }

/* ---------- 結算計算（核心） ---------- */
function computeBalances(){
  const bal={}; members.forEach(m=>bal[m.id]=0);
  expenses.forEach(e=>{
    const baseTotal=e.amount*e.rate_to_base;
    if(bal[e.payer_id]!==undefined) bal[e.payer_id]+=baseTotal;   // 付款人先墊
    if(e.split_type==='equal'){
      const ids=(e.splits||[]).filter(id=>bal[id]!==undefined);
      const share=ids.length?baseTotal/ids.length:0;
      ids.forEach(id=>bal[id]-=share);                            // 各自應分攤
    }else{
      Object.entries(e.splits||{}).forEach(([id,amt])=>{
        if(bal[id]!==undefined) bal[id]-=amt*e.rate_to_base; });
    }
  });
  return bal;
}
function settle(bal){
  const cred=[],debt=[];
  Object.entries(bal).forEach(([id,v])=>{
    const r=Math.round(v*100)/100;
    if(r>0.005) cred.push({id,v:r}); else if(r<-0.005) debt.push({id,v:-r});
  });
  cred.sort((a,b)=>b.v-a.v); debt.sort((a,b)=>b.v-a.v);
  const tx=[]; let i=0,j=0;
  while(i<debt.length&&j<cred.length){
    const pay=Math.min(debt[i].v,cred[j].v);
    tx.push({from:debt[i].id,to:cred[j].id,amt:pay});
    debt[i].v-=pay; cred[j].v-=pay;
    if(debt[i].v<0.005) i++; if(cred[j].v<0.005) j++;
  }
  return tx;
}

/* ---------- 畫面渲染 ---------- */
function renderAll(){ renderExpenses(); renderMembers(); renderSettlement(); renderRates(); }
function renderExpenses(){
  const el=$('expList');
  if(!expenses.length){ el.innerHTML='<div class="muted center">尚無支出</div>'; return; }
  el.innerHTML=expenses.map(e=>{
    const base=e.amount*e.rate_to_base;
    const who=e.split_type==='equal'
      ? `${(e.splits||[]).length} 人平分`
      : `${Object.keys(e.splits||{}).length} 人自訂`;
    return `<div class="exp">
      <div><div class="desc">${e.description}</div>
        <div class="sub">${e.category} · ${memName(e.payer_id)} 付 · ${who}</div></div>
      <div class="amt">${fmt(base)} ${trip.base_currency}
        ${e.currency!==trip.base_currency?`<span class="o">${fmt(e.amount)} ${e.currency}</span>`:''}
        <span class="o"><a onclick="delExpense('${e.id}')" style="cursor:pointer">刪除</a></span>
      </div></div>`;
  }).join('');
}
function renderMembers(){
  $('memList').innerHTML=members.length?members.map(m=>
    `<div class="bal"><span>${m.name}${m.name===me?' （你）':''}</span>
      <button class="danger sm" onclick="delMember('${m.id}')">刪除</button></div>`).join('')
    :'<div class="muted center">尚無成員</div>';
}
function renderSettlement(){
  const bal=computeBalances();
  $('balList').innerHTML=members.length?members.map(m=>{
    const v=bal[m.id]||0, cls=v>0.005?'pos':v<-0.005?'neg':'muted';
    const txt=v>0.005?`應收 ${fmt(v)}`:v<-0.005?`應付 ${fmt(-v)}`:'已平';
    return `<div class="bal"><span>${m.name}</span><span class="${cls}">${txt} ${trip.base_currency}</span></div>`;
  }).join(''):'<div class="muted center">—</div>';
  const tx=settle(bal);
  $('settleList').innerHTML=tx.length?tx.map(t=>
    `<div class="settle"><span>${memName(t.from)}</span><span class="arrow">→</span>
      <span>${memName(t.to)}</span><span class="grow"></span>
      <b>${fmt(t.amt)} ${trip.base_currency}</b></div>`).join('')
    :'<div class="muted center">目前無人需轉帳 🎉</div>';
}
function renderRates(){
  const r=trip.rates||{};
  let html=`<div class="bal"><span>${trip.base_currency}（結算幣別）</span><span class="muted">1</span></div>`;
  html+=Object.keys(r).map(c=>
    `<div class="splitrow"><span class="nm">${c}</span>
      <input type="number" inputmode="decimal" value="${r[c]}" onchange="updateRate('${c}',this.value)">
      <button class="danger sm" onclick="removeCurrency('${c}')">✕</button></div>`).join('');
  $('rateList').innerHTML=html;
}
function updateRate(c,v){ const r={...trip.rates}; r[c]=parseFloat(v)||0; saveRates(r); }
function removeCurrency(c){ const r={...trip.rates}; delete r[c]; saveRates(r); }

/* ---------- 分頁 ---------- */
function showTab(t){
  ['exp','mem','set','cfg'].forEach(x=>$('tab-'+x).classList.toggle('hide',x!==t));
  document.querySelectorAll('#tabbar button').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
}

init();
</script>
